<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - RealCashEarn</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="admin-container">
        <h1>🔧 Admin Panel</h1>
        
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="showTab('withdrawals')">Withdrawals</button>
            <button class="tab-btn" onclick="showTab('users')">All Users</button>
        </div>

        <!-- Withdrawals Tab -->
        <div id="withdrawalsTab" class="tab-content active">
            <h2>Withdrawal Requests</h2>
            <div id="withdrawalsList" class="list-container"></div>
        </div>

        <!-- Users Tab -->
        <div id="usersTab" class="tab-content">
            <h2>All Users</h2>
            <div id="usersList" class="list-container"></div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;

        // Load withdrawals
        async function loadWithdrawals() {
            try {
                const response = await fetch(`${API_URL}/api/admin/withdrawals`);
                const withdrawals = await response.json();
                
                const container = document.getElementById('withdrawalsList');
                if (withdrawals.length === 0) {
                    container.innerHTML = '<p>No withdrawal requests yet.</p>';
                    return;
                }

                container.innerHTML = withdrawals.map(w => `
                    <div class="withdrawal-item ${w.status}">
                        <div class="withdrawal-header">
                            <strong>${w.username}</strong>
                            <span class="status ${w.status}">${w.status.toUpperCase()}</span>
                        </div>
                        <div class="withdrawal-details">
                            <p>Method: ${w.method}</p>
                            <p>Number: ${w.number}</p>
                            <p>Amount: ${w.amount.toFixed(2)} points (৳${(w.amount * 0.10).toFixed(2)})</p>
                            <p>Date: ${new Date(w.created_at).toLocaleString()}</p>
                        </div>
                        ${w.status === 'pending' ? `
                            <div class="withdrawal-actions">
                                <button onclick="updateWithdrawal(${w.id}, 'completed')" class="btn-success">✓ Complete</button>
                                <button onclick="updateWithdrawal(${w.id}, 'rejected')" class="btn-danger">✗ Reject</button>
                            </div>
                        ` : ''}
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Load users
        async function loadUsers() {
            try {
                const response = await fetch(`${API_URL}/api/admin/users`);
                const users = await response.json();
                
                const container = document.getElementById('usersList');
                container.innerHTML = users.map(u => `
                    <div class="user-item">
                        <div>
                            <strong>${u.username}</strong>
                            <p>ID: ${u.user_id}</p>
                        </div>
                        <div class="user-points">
                            ${u.points.toFixed(2)} points
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Update withdrawal status
        async function updateWithdrawal(id, status) {
            try {
                await fetch(`${API_URL}/api/admin/withdrawal/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: status })
                });
                loadWithdrawals();
                alert(`Withdrawal ${status}!`);
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Tab switching
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(`${tabName}Tab`).classList.add('active');
            event.target.classList.add('active');
            
            if (tabName === 'withdrawals') loadWithdrawals();
            if (tabName === 'users') loadUsers();
        }

        // Initial load
        loadWithdrawals();
        
        // Auto-refresh every 30 seconds
        setInterval(loadWithdrawals, 30000);
    </script>
</body>
</html>
